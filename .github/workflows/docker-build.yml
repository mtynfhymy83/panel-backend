name: Build and Push Docker Image

on:
  push:
    branches:
      - main
      - master
    tags:
      - 'v*'
  pull_request:
    branches:
      - main
      - master
  workflow_dispatch:

concurrency:
  group: docker-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest

    env:
      IMAGE_NAME: mtynfhymy83/backend-api

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Verify Docker Hub credentials
        if: github.event_name != 'pull_request'
        shell: bash
        run: |
          if [ -z "${{ secrets.DOCKERHUB_TOKEN }}" ]; then
            echo "::error::Secret DOCKERHUB_TOKEN is not set."
            echo ""
            echo "Add this secret in GitHub:"
            echo "  Repository → Settings → Secrets and variables → Actions → New repository secret"
            echo ""
            echo "  Name:  DOCKERHUB_TOKEN"
            echo "  Value: Docker Hub Access Token"
            echo "         (hub.docker.com → Account Settings → Security → Personal Access Tokens → New)"
            echo ""
            echo "Username is fixed in workflow: mtynfhymy83"
            exit 1
          fi

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Login to Docker Hub
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v4
        with:
          username: mtynfhymy83
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=ref,event=branch
            type=ref,event=tag
            type=sha,prefix=

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
